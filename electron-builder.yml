appId: com.soizoktantas.netradar
productName: NetRadar
copyright: "Copyright © 2024 soizoktantas. All rights reserved."
icon: resources/icon.png
directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - "!out/**/*.map"

mac:
  category: public.app-category.utilities
  darkModeSupport: true
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
    - target: portable
      arch:
        - x64

linux:
  target:
    - target: AppImage
      arch:
        - x64
        - arm64
    - target: deb
      arch:
        - x64
  category: Network

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
